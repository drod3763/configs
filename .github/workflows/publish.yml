name: Publish

on:
  workflow_dispatch:
    inputs:
      package:
        type: choice
        description: Package to publish
        default: all
        options:
          - all
          - eslint-config
          - tsconfig
          - prettier-config
          - markdownlint-config
          - vitest-config
          - commitlint-config

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - name: Publish all packages
        if: inputs.package == 'all'
        run: |
          for pkg in eslint-config tsconfig prettier-config markdownlint-config vitest-config commitlint-config; do
            echo "Publishing $pkg..."
            cd packages/$pkg
            bun pm pack
            bunx npm publish *.tgz --access public --provenance
            rm *.tgz
            cd ../..
          done
      - name: Publish single package
        if: inputs.package != 'all'
        run: |
          cd packages/${{ inputs.package }}
          bun pm pack
          bunx npm publish *.tgz --access public --provenance
          rm *.tgz
