name: Publish

on:
  workflow_dispatch:
    inputs:
      package:
        type: choice
        description: Package to publish
        default: all
        options:
          - all
          - eslint-config
          - tsconfig
          - prettier-config
          - markdownlint-config
          - vitest-config
          - commitlint-config

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - name: Publish all packages
        if: inputs.package == 'all'
        env:
          BUN_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          for pkg in eslint-config tsconfig prettier-config markdownlint-config vitest-config commitlint-config; do
            echo "Publishing $pkg..."
            cd packages/$pkg
            bun publish --access public
            cd ../..
          done
      - name: Publish single package
        if: inputs.package != 'all'
        env:
          BUN_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          cd packages/${{ inputs.package }}
          bun publish --access public
